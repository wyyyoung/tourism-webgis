server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always

spring:
  application:
    name: tourism-webgis
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/tourism_webgis}
    username: ${DB_USERNAME:webgis}
    password: ${DB_PASSWORD:webgis123}
    hikari:
      maximum-pool-size: 8
      minimum-idle: 1
      connection-timeout: 10000
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    default-property-inclusion: non_null

logging:
  level:
    root: INFO
    com.changan.webgis: INFO

routing:
  osrm:
    base-url: ${OSRM_BASE_URL:https://router.project-osrm.org}
    connect-timeout-seconds: ${OSRM_CONNECT_TIMEOUT:8}
    read-timeout-seconds: ${OSRM_READ_TIMEOUT:8}
